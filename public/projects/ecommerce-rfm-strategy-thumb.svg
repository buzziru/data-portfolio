<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif">
  <rect width="760" height="420" fill="#0f1011"/>

  <!-- top 64px kept clear for the card's CASE label + status pill overlay -->

  <!-- Loyal Champion : ▲▲▲ -->
